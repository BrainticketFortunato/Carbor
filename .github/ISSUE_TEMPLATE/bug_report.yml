name: Fehlerbericht
description: Reproduzierbaren Fehler melden
title: "[Fehler] "
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Carbor-Version
    validations:
      required: true
  - type: input
    id: system
    attributes:
      label: Betriebssystem und Desktop
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Schritte zum Nachstellen
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Erwartetes Verhalten
  - type: textarea
    id: actual
    attributes:
      label: Tatsächliches Verhalten
  - type: checkboxes
    id: privacy
    attributes:
      label: Datenschutz
      options:
        - label: Ich habe API-Schlüssel, private Pfade und persönliche Dateinamen entfernt.
          required: true
